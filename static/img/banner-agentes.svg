<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 480" width="1120" height="640" preserveAspectRatio="xMidYMid meet">
  <defs>
    <linearGradient id="agBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f5f8fc"/>
      <stop offset="100%" stop-color="#dce8ff"/>
    </linearGradient>
    <linearGradient id="agAccent" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1760b4"/>
      <stop offset="100%" stop-color="#0d4d92"/>
    </linearGradient>
    <linearGradient id="agBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e9f0fb"/>
    </linearGradient>
    <filter id="agShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#0d4d92" flood-opacity="0.2"/>
    </filter>
  </defs>
  <rect x="0" y="0" width="840" height="480" fill="url(#agBg)"/>

  <!-- connection lines (prompt→context→action→verify cycle) -->
  <g stroke="#59a4ff" stroke-width="2" fill="none" opacity="0.55" stroke-dasharray="6 6">
    <path d="M 130 190 Q 220 130 310 180"/>
    <path d="M 530 180 Q 620 130 710 190"/>
    <path d="M 130 340 Q 220 400 310 350"/>
    <path d="M 530 350 Q 620 400 710 340"/>
  </g>

  <!-- 4 context nodes -->
  <g filter="url(#agShadow)">
    <circle cx="120" cy="180" r="32" fill="#ffffff" stroke="#0d4d92" stroke-width="2.5"/>
    <text x="120" y="186" text-anchor="middle" font-family="Space Grotesk, Segoe UI, sans-serif" font-size="14" font-weight="700" fill="#0d4d92">prompt</text>
  </g>
  <g filter="url(#agShadow)">
    <circle cx="720" cy="180" r="32" fill="#ffffff" stroke="#0d4d92" stroke-width="2.5"/>
    <text x="720" y="186" text-anchor="middle" font-family="Space Grotesk, Segoe UI, sans-serif" font-size="14" font-weight="700" fill="#0d4d92">contexto</text>
  </g>
  <g filter="url(#agShadow)">
    <circle cx="120" cy="340" r="32" fill="#ffffff" stroke="#ef9b50" stroke-width="2.5"/>
    <text x="120" y="346" text-anchor="middle" font-family="Space Grotesk, Segoe UI, sans-serif" font-size="13" font-weight="700" fill="#0d4d92">verificar</text>
  </g>
  <g filter="url(#agShadow)">
    <circle cx="720" cy="340" r="32" fill="#ffffff" stroke="#ef9b50" stroke-width="2.5"/>
    <text x="720" y="346" text-anchor="middle" font-family="Space Grotesk, Segoe UI, sans-serif" font-size="14" font-weight="700" fill="#0d4d92">acción</text>
  </g>

  <!-- central agent: head/body -->
  <g filter="url(#agShadow)">
    <!-- antenna -->
    <line x1="420" y1="115" x2="420" y2="140" stroke="#0d4d92" stroke-width="4" stroke-linecap="round"/>
    <circle cx="420" cy="108" r="7" fill="#ef9b50"/>
    <!-- head -->
    <rect x="320" y="140" width="200" height="150" rx="28" fill="url(#agBody)" stroke="#0d4d92" stroke-width="3"/>
    <!-- eyes -->
    <circle cx="375" cy="210" r="18" fill="#0d4d92"/>
    <circle cx="465" cy="210" r="18" fill="#0d4d92"/>
    <circle cx="380" cy="205" r="5" fill="#ffffff"/>
    <circle cx="470" cy="205" r="5" fill="#ffffff"/>
    <!-- mouth (speaker grille lines) -->
    <rect x="380" y="248" width="80" height="22" rx="11" fill="#0d4d92"/>
    <line x1="395" y1="253" x2="395" y2="265" stroke="#59a4ff" stroke-width="2"/>
    <line x1="410" y1="253" x2="410" y2="265" stroke="#59a4ff" stroke-width="2"/>
    <line x1="425" y1="253" x2="425" y2="265" stroke="#59a4ff" stroke-width="2"/>
    <line x1="440" y1="253" x2="440" y2="265" stroke="#59a4ff" stroke-width="2"/>
    <!-- body -->
    <rect x="350" y="300" width="140" height="90" rx="18" fill="url(#agAccent)"/>
    <!-- chest screen -->
    <rect x="375" y="322" width="90" height="48" rx="8" fill="#ffffff" opacity="0.95"/>
    <rect x="385" y="332" width="60" height="6" rx="3" fill="#0d4d92"/>
    <rect x="385" y="344" width="70" height="6" rx="3" fill="#59a4ff"/>
    <rect x="385" y="356" width="50" height="6" rx="3" fill="#ef9b50"/>
  </g>

  <!-- gear (skills symbol) -->
  <g transform="translate(610, 390)" filter="url(#agShadow)">
    <circle cx="0" cy="0" r="30" fill="#ffffff" stroke="#0d4d92" stroke-width="2.5"/>
    <circle cx="0" cy="0" r="10" fill="#0d4d92"/>
    <g fill="#0d4d92">
      <rect x="-5" y="-42" width="10" height="14" rx="2"/>
      <rect x="-5" y="28" width="10" height="14" rx="2"/>
      <rect x="-42" y="-5" width="14" height="10" rx="2"/>
      <rect x="28" y="-5" width="14" height="10" rx="2"/>
      <rect x="-33" y="-33" width="10" height="14" rx="2" transform="rotate(-45)"/>
      <rect x="20" y="-33" width="10" height="14" rx="2" transform="rotate(45)"/>
      <rect x="20" y="19" width="10" height="14" rx="2" transform="rotate(-45)"/>
      <rect x="-33" y="19" width="10" height="14" rx="2" transform="rotate(45)"/>
    </g>
  </g>

  <!-- sparkle -->
  <g transform="translate(220, 410)" fill="#ef9b50">
    <path d="M 0 -14 L 3 -3 L 14 0 L 3 3 L 0 14 L -3 3 L -14 0 L -3 -3 Z"/>
  </g>
  <g transform="translate(175, 90)" fill="#59a4ff" opacity="0.8">
    <path d="M 0 -10 L 2 -2 L 10 0 L 2 2 L 0 10 L -2 2 L -10 0 L -2 -2 Z"/>
  </g>
  <g transform="translate(660, 80)" fill="#ef9b50" opacity="0.7">
    <path d="M 0 -8 L 2 -2 L 8 0 L 2 2 L 0 8 L -2 2 L -8 0 L -2 -2 Z"/>
  </g>
</svg>
