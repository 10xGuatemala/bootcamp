<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 480" width="1120" height="640" preserveAspectRatio="xMidYMid meet">
  <defs>
    <linearGradient id="docBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f5f8fc"/>
      <stop offset="100%" stop-color="#dce8ff"/>
    </linearGradient>
    <linearGradient id="docAccent" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1760b4"/>
      <stop offset="100%" stop-color="#0d4d92"/>
    </linearGradient>
    <filter id="docShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#0d4d92" flood-opacity="0.18"/>
    </filter>
  </defs>
  <rect x="0" y="0" width="840" height="480" fill="url(#docBg)"/>
  <!-- back document -->
  <g filter="url(#docShadow)">
    <rect x="295" y="110" width="260" height="320" rx="18" fill="#ffffff" stroke="#d7e3f3" stroke-width="2"/>
  </g>
  <!-- front document -->
  <g filter="url(#docShadow)">
    <rect x="250" y="140" width="270" height="310" rx="18" fill="#ffffff" stroke="#c6d6ee" stroke-width="2"/>
    <!-- folded corner -->
    <path d="M 490 140 L 520 140 L 520 170 Z" fill="#e9f0fb"/>
    <path d="M 490 140 L 520 170 L 490 170 Z" fill="#c6d6ee"/>
    <!-- title bar -->
    <rect x="270" y="180" width="120" height="14" rx="6" fill="url(#docAccent)"/>
    <!-- lines -->
    <rect x="270" y="212" width="230" height="8" rx="4" fill="#dce8ff"/>
    <rect x="270" y="228" width="200" height="8" rx="4" fill="#dce8ff"/>
    <rect x="270" y="244" width="220" height="8" rx="4" fill="#dce8ff"/>
    <!-- section -->
    <rect x="270" y="278" width="90" height="10" rx="5" fill="#1760b4"/>
    <rect x="270" y="300" width="230" height="8" rx="4" fill="#dce8ff"/>
    <rect x="270" y="316" width="210" height="8" rx="4" fill="#dce8ff"/>
    <rect x="270" y="332" width="220" height="8" rx="4" fill="#dce8ff"/>
    <rect x="270" y="348" width="180" height="8" rx="4" fill="#dce8ff"/>
    <!-- checkmark list -->
    <circle cx="280" cy="390" r="7" fill="#0d4d92"/>
    <path d="M 276 390 L 279 393 L 285 386" stroke="#ffffff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="296" y="386" width="170" height="8" rx="4" fill="#dce8ff"/>
    <circle cx="280" cy="414" r="7" fill="#0d4d92"/>
    <path d="M 276 414 L 279 417 L 285 410" stroke="#ffffff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="296" y="410" width="150" height="8" rx="4" fill="#dce8ff"/>
  </g>
  <!-- version tag -->
  <g transform="translate(555, 240)">
    <rect x="0" y="0" width="130" height="44" rx="22" fill="url(#docAccent)" filter="url(#docShadow)"/>
    <text x="65" y="29" text-anchor="middle" font-family="Space Grotesk, Segoe UI, sans-serif" font-size="18" font-weight="700" fill="#ffffff">v1.2.0</text>
  </g>
  <!-- pencil -->
  <g transform="translate(565, 320) rotate(35)">
    <rect x="0" y="0" width="90" height="18" rx="4" fill="#f98f4a"/>
    <rect x="0" y="0" width="16" height="18" fill="#ef7a2c"/>
    <path d="M 90 0 L 108 9 L 90 18 Z" fill="#3a2a1a"/>
  </g>
  <!-- small dots (decor) -->
  <circle cx="130" cy="120" r="6" fill="#59a4ff" opacity="0.45"/>
  <circle cx="720" cy="400" r="8" fill="#ef9b50" opacity="0.45"/>
  <circle cx="150" cy="380" r="5" fill="#0d4d92" opacity="0.35"/>
  <circle cx="690" cy="120" r="5" fill="#0d4d92" opacity="0.35"/>
</svg>
